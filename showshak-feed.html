<style>
/* ════════════════════════════════════════════════
   FEED PAGE LAYOUT
════════════════════════════════════════════════ */
html, body { overflow: hidden; }

.layout {
  position: fixed; inset: 0;
  left: var(--sidebar-collapsed);
  display: flex; align-items: stretch; justify-content: center;
  background: #000;
  transition: left 0.3s var(--ease-smooth);
}
.layout::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(234,59,50,0.04) 0%, transparent 70%);
  pointer-events: none;
}

@media (max-width: 700px) {
  .layout { left: 0; }
}

/* ════════════════════════════════════════════════
   CLIP COLUMN + FEED
════════════════════════════════════════════════ */
.clip-column {
  position: relative;
  width: var(--clip-w);
  flex-shrink: 0;
  height: 100vh;
  overflow: visible;
}

.feed {
  position: absolute; inset: 0;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.feed::-webkit-scrollbar { display: none; }

/* ════════════════════════════════════════════════
   CLIP CARD
════════════════════════════════════════════════ */
.clip {
  position: relative;
  width: 100%; height: 100vh;
  scroll-snap-align: start; scroll-snap-stop: always;
  overflow: hidden; flex-shrink: 0;
}

.clip-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transform: scale(1.04);
  transition: transform 0.7s var(--ease-smooth);
}
.clip.active .clip-bg { transform: scale(1); }

.clip-vignette {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.45) 28%, rgba(0,0,0,0.0) 55%, rgba(0,0,0,0.2) 100%);
  pointer-events: none;
}

.clip-grain {
  position: absolute; inset: 0; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* Full-clip tap zone */
.clip-tap {
  position: absolute; inset: 0; z-index: 5; cursor: pointer;
}

/* Pause icon that appears on single tap */
.clip-pause-icon {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0);
  width: 64px; height: 64px; border-radius: 50%;
  background: rgba(0,0,0,0.55); border: 2px solid rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  transition: transform 0.18s var(--ease-spring), opacity 0.25s;
  opacity: 0;
}
.clip-pause-icon.show {
  transform: translate(-50%,-50%) scale(1);
  opacity: 1;
}

/* ── Double-tap fire burst ─── */
.fire-burst {
  position: absolute; z-index: 30; pointer-events: none;
  transform: translate(-50%, -50%) scale(0);
  opacity: 0; width: 90px; height: 90px;
  display: flex; align-items: center; justify-content: center;
}
.fire-burst svg { width: 100%; height: 100%; }

@keyframes burstIn {
  0%   { transform: translate(-50%,-50%) scale(0);   opacity: 0; }
  30%  { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
  60%  { transform: translate(-50%,-50%) scale(0.95);opacity: 1; }
  80%  { transform: translate(-50%,-50%) scale(1.1); opacity: 0.9; }
  100% { transform: translate(-50%,-50%) scale(1.4); opacity: 0; }
}
.fire-burst.pop {
  animation: burstIn 0.7s cubic-bezier(.36,.07,.19,.97) forwards;
}

/* ── Mobile floating logo ─── */
.clip-logo-float {
  position: absolute; top: calc(14px + env(safe-area-inset-top, 0px)); left: 14px; z-index: 20;
  display: none; align-items: center; gap: 7px;
  pointer-events: none;
}
.clip-logo-mark {
  width: 30px; height: 30px;
  background: rgba(0,0,0,0.6);
  border-radius: 8px; overflow: hidden;
  border: 1px solid rgba(234,59,50,0.3);
  backdrop-filter: blur(8px);
}
.clip-logo-mark svg { width: 100%; height: 100%; display: block; }

/* ── Muted badge ─── */
.muted-badge {
  position: absolute; top: calc(54px + env(safe-area-inset-top, 0px)); left: 14px; z-index: 20;
  display: flex; align-items: center; gap: 5px;
  background: rgba(0,0,0,0.5); border: 1px solid var(--border);
  border-radius: 100px; padding: 4px 10px;
  font-size: 11px; color: var(--gray);
  backdrop-filter: blur(8px); cursor: pointer; transition: opacity 0.3s;
}

/* ── Frame mute/unmute button (tap to hear a clip without opening it) ─── */
.clip-mute {
  position: absolute; top: calc(14px + env(safe-area-inset-top, 0px)); right: 14px; z-index: 35;
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  backdrop-filter: blur(8px);
  transition: background 0.15s, transform 0.15s;
}
.clip-mute:hover  { background: rgba(0,0,0,0.7); transform: scale(1.06); }
.clip-mute:active { transform: scale(0.92); }
.clip-mute .clip-mute-off { display: none; }
.clip-mute.muted .clip-mute-on  { display: none; }
.clip-mute.muted .clip-mute-off { display: block; }
/* On desktop the fixed action rail sits to the right of the clip column, so the
   top-right mute button is clear; on mobile it stays inside the frame. */

/* ════════════════════════════════════════════════
   CLIP BOTTOM CONTENT
════════════════════════════════════════════════ */
.clip-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
  padding: 0 14px 14px;
}

.creator-row {
  display: flex; align-items: center; gap: 7px; margin-bottom: 5px;
}
.creator-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.3);
  overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff; text-transform: uppercase;
}
.creator-name { font-size: 11px; font-weight: 600; color: var(--white); }
.creator-follow {
  font-size: 10px; color: var(--red); font-weight: 700; cursor: pointer;
  padding: 2px 7px; border: 1px solid var(--red); border-radius: 100px;
  transition: background 0.15s;
}
.creator-follow:hover { background: rgba(234,59,50,0.15); }
.creator-follow.is-following { background: var(--red); color: #fff; }

.show-title {
  font-family: var(--font-display);
  font-size: clamp(20px, 4.5vw, 30px);
  letter-spacing: 1px; color: var(--white); line-height: 1.05;
  margin-bottom: 5px; text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}

.tag-row {
  display: flex; align-items: center; gap: 5px;
  flex-wrap: nowrap; overflow: hidden; margin-bottom: 5px;
}

.caption {
  font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.caption em { color: var(--white); font-style: normal; font-weight: 600; }

/* ── Progress bar ─── */
.clip-progress {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: rgba(255,255,255,0.08); z-index: 20;
  opacity: 0; transition: opacity 0.3s ease;
}
.clip-progress.visible { opacity: 1; }
.clip-progress-fill {
  height: 100%; background: var(--red);
  border-radius: 2px; transition: width 0.1s linear;
}

/* ════════════════════════════════════════════════
   DESKTOP ACTION RAIL
════════════════════════════════════════════════ */
.action-rail-outer {
  position: fixed; top: 50%; left: 0;
  transform: translateY(-50%);
  z-index: 150;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  pointer-events: all;
}

.act-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.act-icon {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s var(--ease-spring), opacity 0.15s;
}
.act-btn:hover .act-icon { opacity: 0.75; }
.act-btn:active .act-icon { transform: scale(0.85); }
.act-label {
  font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.8);
  letter-spacing: 0.2px; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}

/* Fire toggle states */
.fire-outline { display: block; }
.fire-filled  { display: none;  }
.act-btn.lit .fire-outline { display: none; }
.act-btn.lit .fire-filled  { display: block; }
.act-btn.lit .act-label    { color: var(--red); }

@keyframes firePulse {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.45); }
  55%  { transform: scale(0.9); }
  75%  { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.act-btn.pulse .act-icon { animation: firePulse 0.42s cubic-bezier(.36,.07,.19,.97) forwards; }

/* Save toggle states */
.save-outline { display: block; }
.save-filled  { display: none;  }
.act-btn.saved .save-outline { display: none; }
.act-btn.saved .save-filled  { display: block; }
.act-btn.saved .act-label    { color: rgba(234,59,50,0.9); }

/* Rail entrance animation */
@keyframes railSlideIn {
  0%   { opacity: 0; transform: translateY(-50%) translateX(28px) scale(0.88); }
  55%  { opacity: 1; transform: translateY(-50%) translateX(-5px) scale(1.03); }
  78%  {             transform: translateY(-50%) translateX(3px) scale(0.99); }
  100% { opacity: 1; transform: translateY(-50%) translateX(0) scale(1); }
}
.action-rail-outer.entering {
  animation: railSlideIn 0.44s var(--ease-spring) forwards;
}

/* ── Watch It pill (desktop) ─── */
.rail-watch-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; pointer-events: all; margin-top: 12px;
}
.rail-watch-pill {
  width: 56px; height: 56px; border-radius: 18px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  border: 1.5px solid rgba(255,255,255,0.2);
  position: relative; overflow: hidden;
  transition: transform 0.18s var(--ease-spring), box-shadow 0.3s ease;
  --pill-rgb: 229, 9, 20;
  animation: breatheGlow 2.8s ease-in-out infinite;
}

@keyframes breatheGlow {
  0%,100% {
    box-shadow: 0 0 0px 0px rgba(var(--pill-rgb),0), 0 4px 20px rgba(0,0,0,0.6);
  }
  50% {
    box-shadow:
      0 0 18px 6px rgba(var(--pill-rgb),0.45),
      0 0 38px 12px rgba(var(--pill-rgb),0.18),
      0 4px 20px rgba(0,0,0,0.4);
  }
}

@keyframes ctaFireFlash {
  0%   { filter: brightness(1) saturate(1); }
  25%  { filter: brightness(1.5) saturate(1.4) drop-shadow(0 0 12px rgba(255,255,255,0.4)); }
  55%  { filter: brightness(1.3) saturate(1.2); }
  100% { filter: brightness(1) saturate(1); }
}
.rail-watch-pill.fire-flash {
  animation:
    ctaFireFlash 0.5s cubic-bezier(.36,.07,.19,.97) forwards,
    breatheGlow 2.8s ease-in-out 0.5s infinite;
}

.rail-watch-pill:hover {
  transform: scale(1.1); animation: none;
  box-shadow: 0 0 24px 8px rgba(var(--pill-rgb),0.55), 0 6px 24px rgba(0,0,0,0.5);
}
.rail-watch-pill:active { transform: scale(0.93); }
.rail-watch-pill-play { display: flex; align-items: center; justify-content: center; }
.rail-watch-pill-plat {
  font-size: 8px; font-weight: 800; color: rgba(255,255,255,0.75);
  letter-spacing: 0.5px; text-transform: uppercase; line-height: 1;
  max-width: 48px; text-align: center; overflow: hidden;
  white-space: nowrap; text-overflow: ellipsis;
}
.rail-watch-label {
  font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.9);
  letter-spacing: 1px; text-align: center;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8); text-transform: uppercase;
}

/* ════════════════════════════════════════════════
   MOBILE ACTION RAIL
════════════════════════════════════════════════ */
.mobile-action-rail {
  display: none;
  position: absolute; right: 10px; bottom: 110px; z-index: 30;
  flex-direction: column; align-items: center; gap: 18px;
}

.m-act-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none;
}
.m-act-icon {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s var(--ease-spring);
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.9));
}
.m-act-btn:active .m-act-icon { transform: scale(0.82); }
.m-act-label {
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.85);
  text-shadow: 0 1px 6px rgba(0,0,0,1); letter-spacing: 0.3px;
}

.m-fire-outline { display: block; }
.m-fire-filled  { display: none;  }
.m-act-btn.lit .m-fire-outline { display: none; }
.m-act-btn.lit .m-fire-filled  { display: block; }
.m-act-btn.lit .m-act-label    { color: var(--red); }
.m-act-btn.pulse .m-act-icon   { animation: firePulse 0.42s cubic-bezier(.36,.07,.19,.97) forwards; }

.m-save-outline { display: block; }
.m-save-filled  { display: none;  }
.m-act-btn.saved .m-save-outline { display: none; }
.m-act-btn.saved .m-save-filled  { display: block; }
.m-act-btn.saved .m-act-label    { color: rgba(234,59,50,0.9); }

/* ── Mobile Watch It button ─── */
.mobile-watch-btn {
  display: none;
  position: absolute; bottom: 14px; left: 14px; right: 60px; z-index: 30;
  align-items: center; justify-content: center;
  height: 52px; border-radius: 16px;
  font-family: var(--font-body); font-size: 14px; font-weight: 700;
  color: #fff; border: none; cursor: pointer;
  transition: transform 0.15s, opacity 0.15s, filter 0.15s;
  letter-spacing: 0.3px;
  -webkit-tap-highlight-color: transparent;
  --btn-rgb: 229, 9, 20;
  animation: mobileButtonBreathe 2.8s ease-in-out infinite;
  box-shadow: 0 6px 28px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.18);
}

@keyframes mobileButtonBreathe {
  0%,100% {
    box-shadow:
      0 0 0px 0px rgba(var(--btn-rgb),0),
      0 6px 28px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.18);
  }
  50% {
    box-shadow:
      0 0 20px 6px rgba(var(--btn-rgb),0.4),
      0 0 44px 14px rgba(var(--btn-rgb),0.15),
      0 6px 28px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.18);
  }
}

@keyframes mobileCtaFireFlash {
  0%   { filter: brightness(1) saturate(1); }
  25%  { filter: brightness(1.6) saturate(1.4) drop-shadow(0 0 14px rgba(255,255,255,0.35)); }
  55%  { filter: brightness(1.3) saturate(1.2); }
  100% { filter: brightness(1) saturate(1); }
}
.mobile-watch-btn.fire-flash {
  animation:
    mobileCtaFireFlash 0.5s cubic-bezier(.36,.07,.19,.97) forwards,
    mobileButtonBreathe 2.8s ease-in-out 0.5s infinite;
}
.mobile-watch-btn:active { transform: scale(0.97); opacity: 0.9; }

.mobile-watch-btn-inner {
  display: flex; align-items: center; justify-content: center;
  width: 100%; padding: 0 14px; gap: 10px; pointer-events: none;
}
.mobile-watch-plat-logo {

<!-- ════════════════════════════════════════════
     PWA COLD-LAUNCH SPLASH (installed app only, once per session)
     Paints instantly over the feed so the app open shows the logo + a loading
     bar instead of a black screen; fades out when the feed has mounted.
════════════════════════════════════════════ -->
<style>
  #ss-splash{position:fixed;inset:0;z-index:99999;background:#0B0B0F;display:flex;align-items:center;justify-content:center;transition:opacity .45s ease;}
  #ss-splash .sp-in{display:flex;flex-direction:column;align-items:center;gap:16px;animation:spPop .5s cubic-bezier(.34,1.56,.64,1) both;}
  #ss-splash .sp-logo{width:96px;height:96px;border-radius:24px;overflow:hidden;background:#000;box-shadow:0 0 60px rgba(234,59,50,.35),0 0 120px rgba(234,59,50,.12);border:1px solid rgba(234,59,50,.25);}
  #ss-splash .sp-logo img{width:100%;height:100%;display:block;}
  #ss-splash .sp-wm{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:4px;color:#fff;line-height:1;}
  #ss-splash .sp-wm span{color:#EA3B32;}
  #ss-splash .sp-tag{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:#5A5A72;margin-top:-4px;}
  #ss-splash .sp-bar{width:120px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:8px;}
  #ss-splash .sp-bar i{display:block;height:100%;width:38%;background:#EA3B32;border-radius:2px;animation:spSlide 1.1s ease-in-out infinite;}
  @keyframes spPop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
  @keyframes spSlide{0%{transform:translateX(-120%)}100%{transform:translateX(330%)}}
</style>
<div id="ss-splash">
  <div class="sp-in">
    <div class="sp-logo"><img src="icon.svg" alt="ShowShak"></div>
    <div class="sp-wm">SHOW<span>SHAK</span></div>
    <div class="sp-tag">Swipe · Discover · Watch</div>
    <div class="sp-bar"><i></i></div>
  </div>
</div>
<script>
(function(){
  var splash = document.getElementById('ss-splash');
  if (!splash) return;
  var standalone = false;
  try { standalone = (window.matchMedia && matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true; } catch (e) {}
  var shownThisSession = false;
  try { shownThisSession = sessionStorage.getItem('ss_splash_v1') === '1'; } catch (e) {}
  // Show ONLY on an installed-app cold launch, once per session — never on the
  // website or on internal navigation back to the feed.
  if (!standalone || shownThisSession) { splash.remove(); return; }
  try { sessionStorage.setItem('ss_splash_v1', '1'); } catch (e) {}
  document.body.style.opacity = '1';   // splash covers FOUC → reveal it immediately
  var shown = Date.now();
  window.__ssHideSplash = function () {
    var el = document.getElementById('ss-splash'); if (!el) return;
    var wait = Math.max(0, 800 - (Date.now() - shown));   // min display so it never flashes
    setTimeout(function () {
      el.style.opacity = '0';
      setTimeout(function () { if (el && el.parentNode) el.remove(); }, 480);
    }, wait);
    window.__ssHideSplash = null;
  };
  setTimeout(function () { if (window.__ssHideSplash) window.__ssHideSplash(); }, 3500); // safety net
})();
</script>

<!-- ════════════════════════════════════════════
     PAGE-SPECIFIC JS — Feed logic only
════════════════════════════════════════════ -->
<script>
/* Clip data now comes from the central source (data/showshak-data.js).
   SSData.feedShows() returns the exact SHOWS shape this page expects. */
let SHOWS = SSData.feedShows();

/* ── Load REAL clips from the database (Step 4) ──
   Maps live `content` rows (joined to creator + title + platform) into
   the exact SHOWS shape this page renders. Each clip carries its real
   DB id so fires/saves/follows link by foreign key. Falls back to the
   mock SHOWS silently if logged out / offline / no clips yet. */
async function loadRealClips() {
  // First window only (~SS_CLIP_WINDOW); the pager fetches more on scroll.
  const win = (typeof ssLoadClipWindow === "function") ? await ssLoadClipWindow(0) : [];
  if (!win.length) return false;
  SHOWS = win;
  return true;
}

// ── INIT ──
// Load data, then hand the Feed to the shared Clip_Engine. The engine renders
// the per-clip frames into #feed, drives playback/gestures/progress/sound, owns
// the mobile per-clip rail + the fixed desktop #action-rail (positionRail), the
// IntersectionObserver, keyboard nav, and window.navigateFeed (#nav-arrows).
//
// Open path is stale-while-revalidate for a seamless, Instagram/TikTok-grade
// open: render the per-user cached first window INSTANTLY (poster-first), then
// revalidate against the DB once and only re-mount if it actually changed.
(async function initFeed() {
  const feedEl = document.getElementById('feed');
  let mountedFromCache = false;
  const cache = (typeof ssReadFeedCache === 'function') ? ssReadFeedCache() : null;

  // 1) Instant shell from the per-user cache (no spinner, posters show at once).
  if (cache && cache.clips && cache.clips.length) {
    SHOWS = cache.clips;
    // First-clip priority (clip-player Phase 4, Req 7.1-7.3): kick off the very
    // first clip's manifest + poster fetch BEFORE we mount, so landing playback
    // doesn't wait on a cold fetch.
    if (typeof ssWarmClips === 'function') ssWarmClips(SHOWS, 1);
    ClipEngine.mountInline(feedEl, SHOWS);
    if (typeof ssWarmClips === 'function') ssWarmClips(SHOWS);
    mountedFromCache = true;
    if (window.__ssHideSplash) window.__ssHideSplash();   // feed is visible → lift the splash
    // Very fresh cache → skip the revalidation query entirely (lighter on DB).
    if (cache.ageMs < (window.SS_FEED_FRESH_MS || 30000)) {
      if (typeof ssStartFeedPager === 'function') ssStartFeedPager(feedEl, SHOWS.length);
      return;
    }
  }

  // 2) Revalidate against the DB (also the first-ever load for a new user).
  const real = await loadRealClips();
  if (real) {
    if (typeof ssWriteFeedCache === 'function') ssWriteFeedCache(SHOWS);
    if (typeof ssWarmClips === 'function') ssWarmClips(SHOWS);
    // Re-mount ONLY if the first window changed — a correct cache never flashes
    // or interrupts the clip already playing.
    if (!mountedFromCache || (typeof ssFeedListChanged === 'function' && ssFeedListChanged(cache && cache.clips, SHOWS))) {
      ClipEngine.mountInline(feedEl, SHOWS);
    }
    if (typeof ssStartFeedPager === 'function') ssStartFeedPager(feedEl, SHOWS.length);
  } else if (!mountedFromCache) {
    // No cache + no real clips (logged out / offline / none yet) → mock fallback.
    ClipEngine.mountInline(feedEl, SHOWS);
  }
  if (window.__ssHideSplash) window.__ssHideSplash();   // fresh load mounted → lift the splash
})();
</script>
