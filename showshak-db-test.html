<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShowShak — DB Connection Test</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0B0B0F; color: #fff;
      max-width: 640px; margin: 0 auto; padding: 40px 20px;
    }
    h1 { font-size: 20px; }
    #status {
      padding: 14px 16px; border-radius: 12px; margin: 16px 0;
      font-weight: 600; font-size: 14px;
    }
    .pending { background: #1A1A24; color: #9a9aac; }
    .ok      { background: rgba(39,174,96,0.15); color: #2ecc71; border: 1px solid rgba(39,174,96,0.4); }
    .err     { background: rgba(234,59,50,0.15); color: #ff5a4d; border: 1px solid rgba(234,59,50,0.4); }
    .row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; background: #13131A;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; margin-bottom: 8px;
    }
    .chip {
      width: 34px; height: 34px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 12px; color: #fff; flex-shrink: 0;
    }
    .label { font-weight: 600; }
    .sub { font-size: 12px; color: #6b6b7a; }
    pre {
      background: #13131A; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; padding: 14px; overflow-x: auto;
      font-size: 12px; color: #9a9aac;
    }
    h2 { font-size: 14px; color: #6b6b7a; margin: 24px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
  </style>
</head>
<body>
  <h1>ShowShak — Database Connection Test</h1>
  <p class="sub">This page reads live from your Supabase database. If the moods &amp; platforms below load, the frontend ↔ backend pipe works.</p>

  <div id="status" class="pending">Connecting to database…</div>

  <h2>Moods (read from database)</h2>
  <div id="moods"></div>

  <h2>Platforms (read from database)</h2>
  <div id="platforms"></div>

  <h2>Raw response (debug)</h2>
  <pre id="raw">—</pre>

  <!-- Supabase library, then our connection, then this page's test -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="showshak-supabase.js"></script>
  <script>
    async function runTest() {
      const statusEl = document.getElementById('status');
      const rawEl    = document.getElementById('raw');

      if (!window.ssDB) {
        statusEl.className = 'err';
        statusEl.textContent = '✗ Could not create the Supabase client (library not loaded).';
        return;
      }

      try {
        // Read the two seeded reference tables.
        const moodsRes     = await window.ssDB.from('moods').select('name, tag').order('name');
        const platformsRes = await window.ssDB.from('platforms').select('name, color, abbr');

        if (moodsRes.error)     throw moodsRes.error;
        if (platformsRes.error) throw platformsRes.error;

        // Render moods
        document.getElementById('moods').innerHTML = moodsRes.data.map(m => `
          <div class="row">
            <div class="chip" style="background:#EA3B32">🔥</div>
            <div><div class="label">${m.name}</div><div class="sub">${m.tag || ''}</div></div>
          </div>`).join('');

        // Render platforms
        document.getElementById('platforms').innerHTML = platformsRes.data.map(p => `
          <div class="row">
            <div class="chip" style="background:${p.color}">${p.abbr}</div>
            <div><div class="label">${p.name}</div></div>
          </div>`).join('');

        statusEl.className = 'ok';
        statusEl.textContent = `✓ Connected! Read ${moodsRes.data.length} moods and ${platformsRes.data.length} platforms straight from the database.`;
        rawEl.textContent = JSON.stringify({ moods: moodsRes.data, platforms: platformsRes.data }, null, 2);
      } catch (e) {
        statusEl.className = 'err';
        statusEl.textContent = '✗ ' + (e.message || 'Something went wrong — see raw response below.');
        rawEl.textContent = JSON.stringify(e, null, 2);
      }
    }
    runTest();
  </script>
</body>
</html>
