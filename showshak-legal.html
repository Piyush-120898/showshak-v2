<style>
html, body { overflow: hidden; }

/* In-page modal mode (?modal=1, loaded in the ssOpenLegal iframe): drop all page
   chrome and show ONLY the requested document, edge-to-edge in the iframe. */
html.ss-legal-modal #ss-nav,
html.ss-legal-modal .legal-head,
html.ss-legal-modal .doc-tabs { display: none !important; }
html.ss-legal-modal .layout { left: 0 !important; }
html.ss-legal-modal .legal-scroll { padding-bottom: 16px !important; }
html.ss-legal-modal .wrap { padding-top: 6px; }
html.ss-legal-modal .doc { padding-top: 8px; }

.layout {
  position: fixed; inset: 0; left: var(--sidebar-collapsed);
  display: flex; flex-direction: column; background: var(--bg); overflow: hidden;
  transition: left 0.3s var(--ease-smooth);
}
@media (max-width: 700px) { .layout { left: 0; } }

.legal-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: thin; scrollbar-color: var(--bg4) transparent;
}
.legal-scroll::-webkit-scrollbar { width: 3px; }
.legal-scroll::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }
@media (max-width: 700px) { .legal-scroll { padding-bottom: calc(var(--mobile-nav-h) + 8px); } }

.wrap { max-width: 720px; margin: 0 auto; padding: 0 24px 60px; }
@media (max-width: 700px) { .wrap { padding: 0 16px 40px; } }

/* Sticky header with back */
.legal-head {
  position: sticky; top: 0; z-index: 20;
  background: rgba(11,11,15,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px; padding: 16px 24px;
}
@media (max-width: 700px) { .legal-head { padding: calc(14px + env(safe-area-inset-top, 0px)) 16px 14px; } }
.legal-back {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  color: var(--white); cursor: pointer; transition: background 0.15s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.legal-back:hover { background: rgba(255,255,255,0.1); }
.legal-back:active { transform: scale(0.92); }
.legal-head-title { font-family: var(--font-display); font-size: 26px; letter-spacing: 1.5px; color: var(--white); }
.legal-head-title em { color: var(--red); font-style: normal; }

/* Doc tabs */
.doc-tabs {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 20px 0 4px; position: sticky; top: 0;
}
.doc-tab {
  padding: 9px 15px; border-radius: 100px; font-size: 12.5px; font-weight: 700;
  letter-spacing: 0.3px; color: var(--gray); cursor: pointer;
  background: var(--bg2); border: 1px solid var(--border);
  transition: background 0.13s, color 0.13s, border-color 0.13s;
  -webkit-tap-highlight-color: transparent; white-space: nowrap;
}
.doc-tab:hover { background: var(--bg3); color: var(--white); }
.doc-tab.on { background: var(--red); border-color: var(--red); color: #fff; }

/* Document */
.doc { animation: ss-fadeUp 0.28s ease both; padding-top: 22px; }
@keyframes ss-fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.doc-title { font-family: var(--font-display); font-size: 34px; letter-spacing: 1px; color: var(--white); line-height: 1.05; }
@media (max-width: 700px) { .doc-title { font-size: 28px; } }

/* Version + effective date badge (Req 2.4) */
.doc-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.meta-chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11.5px; font-weight: 600; color: var(--gray);
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px;
}
.meta-chip b { color: var(--white); font-weight: 700; }

/* Counsel review required marker (Req 2.5) */
.counsel-banner {
  display: flex; align-items: flex-start; gap: 11px;
  margin: 18px 0 6px; padding: 13px 15px; border-radius: 12px;
  background: rgba(234,59,50,0.08); border: 1px solid var(--border2);
}
.counsel-banner svg { flex-shrink: 0; color: var(--red2); margin-top: 1px; }
.counsel-banner-txt { font-size: 12.5px; line-height: 1.5; color: var(--white); }
.counsel-banner-txt b { color: var(--red2); text-transform: uppercase; letter-spacing: 0.5px; font-size: 11.5px; }

/* Source indicator (placeholder vs stored) */
.src-note { font-size: 11px; color: var(--gray2); margin: 10px 2px 0; line-height: 1.5; }

/* Body */
.doc-body { margin-top: 22px; color: var(--gray); font-size: 14.5px; line-height: 1.7; }
.doc-body.stored { white-space: pre-wrap; }
.doc-body h3 { color: var(--white); font-size: 16px; font-weight: 700; margin: 26px 0 10px; letter-spacing: 0.2px; }
.doc-body p { margin: 0 0 13px; }
.doc-body ul { margin: 0 0 14px; padding-left: 20px; }
.doc-body li { margin: 0 0 7px; }
.doc-body strong { color: var(--white); font-weight: 600; }
.ph-tag {
  display: inline-block; font-size: 10px; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase; color: var(--red2);
  background: rgba(234,59,50,0.1); border: 1px solid var(--border2);
  border-radius: 5px; padding: 1px 6px; margin-right: 6px; vertical-align: middle;
}

/* Intake CTA + Grievance Officer (copyright doc) */
.intake-cta {
  display: flex; align-items: center; gap: 12px; margin: 24px 0;
  padding: 16px 18px; border-radius: 14px;
  background: var(--bg2); border: 1px solid var(--border);
  cursor: pointer; transition: background 0.13s, border-color 0.13s;
  -webkit-tap-highlight-color: transparent;
}
.intake-cta:hover { background: var(--bg3); border-color: var(--border2); }
.intake-cta-ic {
  width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(234,59,50,0.1); color: var(--red); border: 1px solid var(--border2);
}
.intake-cta-main { flex: 1; min-width: 0; }
.intake-cta-title { font-size: 14.5px; font-weight: 700; color: var(--white); margin-bottom: 2px; }
.intake-cta-sub { font-size: 12px; color: var(--gray2); }

.officer-card {
  margin: 22px 0; padding: 18px; border-radius: 14px;
  background: var(--bg2); border: 1px solid var(--border);
}
.officer-card h3 { color: var(--white); font-size: 15px; font-weight: 700; margin: 0 0 4px; }
.officer-row { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
.officer-row:last-child { border-bottom: none; }
.officer-k { color: var(--gray2); min-width: 110px; font-weight: 600; }
.officer-v { color: var(--white); flex: 1; }

.legal-foot-note { font-size: 11px; color: var(--gray2); text-align: center; margin-top: 40px; line-height: 1.6; }
</style>

<script>
/* ════════════════════════════════════════════════

   addressable documents selected by ?doc=tos|privacy|copyright|community.

   Each doc tries to load its CURRENT stored version via

   NOTHING here is real/binding legal language — it is non-binding

   Sacred rules: title-blind + scoreboard-safe. No fires-received totals,

════════════════════════════════════════════════ */

const REPEAT_THRESHOLD = 3;       /* PLACEHOLDER — these two values live ONLY here (Req 6.5) */
const REPEAT_WINDOW_DAYS = 180;   /* PLACEHOLDER — counsel review required */

const DOC_ORDER = ['tos', 'privacy', 'copyright', 'community', 'curator'];

const DOCS = {
  tos: {
    short: 'Terms of Service',
    title: 'Terms of Service',

    effective_date: '2025-01-01',

    short: 'Copyright / DMCA',
    title: 'Copyright & DMCA Policy',
    version: '0.1-draft',
    effective_date: '2025-01-01',
    body: `
      <p><span class="ph-tag">Placeholder</span> The text below is non-binding scaffolding describing

      <h3>2. The license you grant ShowShak</h3>

      <h3>3. Neutral host — no ownership of underlying works</h3>
      <p>This section will state that ShowShak is a neutral host and showcase that does not host the
      underlying shows or movies; the "Watch It" action links out to third-party streaming platforms.</p>
      <h3>4. Your rights warranty</h3>

/* ── Grievance Officer block (Req 7.1) — placeholder, counsel review required ── */
const GRIEVANCE_OFFICER = {
  name: '[Placeholder — officer to be appointed]',
  designation: 'Grievance Officer (India IT Rules 2021)',
  contact: 'grievance@showshak.example (placeholder)'
};

/* ── helpers ── */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function getDocParam() {
  let doc = 'tos';
  try {
    const p = new URLSearchParams(location.search).get('doc');
    if (p && DOCS[p]) doc = p;            /* unknown/absent → default tos */
  } catch (e) {}
  return doc;
}

/* The consent gate and the become-a-curator step link here with ?doc=…&v=<bound>
   so the reader sees the EXACT version that will be stamped on their record.
   Returns the trimmed version string, or null when no usable ?v= is present. */
function getVerParam() {
  try {
    const v = new URLSearchParams(location.search).get('v');
    if (v != null && String(v).trim().length >= 1) return String(v).trim();
  } catch (e) {}
  return null;
}

const COUNSEL_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12" y2="17"/></svg>';
const COUNSEL_BANNER =
  '<div class="counsel-banner">' + COUNSEL_SVG +
  '<div class="counsel-banner-txt"><b>Counsel review required</b><br>' +
  'This is placeholder scaffolding, not final legal text or legal advice. The binding wording will be ' +
  'supplied by IP counsel before this policy takes effect.</div></div>';

function tabsHtml(active) {
  return DOC_ORDER.map(function (k) {
    return '<div class="doc-tab ' + (k === active ? 'on' : '') + '" onclick="selectDoc(\'' + k + '\')">' +
      esc(DOCS[k].short) + '</div>';
  }).join('');
}

function metaHtml(version, effectiveDate) {
  return '<div class="doc-meta">' +
    '<span class="meta-chip">Version <b>' + esc(version) + '</b></span>' +
    '<span class="meta-chip">Effective <b>' + esc(effectiveDate) + '</b></span>' +

function goIntake() {
  if (typeof ssNavigate === 'function') ssNavigate('showshak-dmca.html');
  else location.href = 'showshak-dmca.html';

function legalBack() {
  if (typeof ssNavigate === 'function') ssNavigate('showshak-settings.html');
  else location.href = 'showshak-settings.html';
}

/* Switch the active doc without a full reload (keeps ?doc in the URL). */
function selectDoc(doc) {
  if (!DOCS[doc]) doc = 'tos';
  try { history.replaceState(null, '', '?doc=' + doc); } catch (e) {}
  renderDoc(doc);
}

/* Render one document. Resolves the version to show, loads its EXACT stored
   body, and degrades to the marked placeholder scaffolding when no row exists. */
async function renderDoc(doc) {
  const cfg = DOCS[doc];
  const tabs = document.getElementById('doc-tabs');
  const host = document.getElementById('doc');
  if (tabs) tabs.innerHTML = tabsHtml(doc);

  /* ── Resolve which version to show, then load its EXACT stored body. ──
     Priority:
       1. ?v=<version> in the URL — the consent gate / become-a-curator step
          pass the bound version so the reader sees exactly what the record
          will stamp (Req 4.4 / 9.3).
       2. Otherwise the CURRENT version (is_current) via ssCurrentPolicyVersions
          — { curator:true } for the curator doc, default for tos/privacy
          (Req 1.2 / 8.2).
     Docs with no seeded version (copyright/community), a missing current row,
     or a load error fall through to the placeholder scaffolding below
     (Req 1.6 / 1.9 / 8.4 / 8.5). */
  let loaded = null;
  if (typeof ssLoadPolicyVersion === 'function') {
    try {
      let targetVer = getVerParam();
      if (!targetVer &&
          (doc === 'tos' || doc === 'privacy' || doc === 'curator') &&
          typeof ssCurrentPolicyVersions === 'function') {
        const cur = await ssCurrentPolicyVersions(doc === 'curator' ? { curator: true } : undefined);
        if (cur && cur.ok && cur[doc] && cur[doc].version) targetVer = cur[doc].version;
      }
      if (targetVer) {
        const r = await ssLoadPolicyVersion(doc, targetVer);
        if (r && r.ok && r.policy && r.policy.body) loaded = r.policy;
      }
    } catch (e) { loaded = null; }
  }

  const version = loaded ? (loaded.version || cfg.version) : cfg.version;
  const effDate = loaded ? (loaded.effective_date || cfg.effective_date) : cfg.effective_date;

  /* Counsel marker tracks the rendered body (Req 1.4 / 8.3): a stored body that
     still carries bracketed [..] tokens keeps the banner via
     ssPolicyNeedsCounselReview; the built-in scaffolding is placeholder by
     definition so it always shows it. Final bracket-free seeded text suppresses
     it. */
  let needsCounsel = true;
  if (loaded) {
    needsCounsel = (typeof ssPolicyNeedsCounselReview === 'function')
      ? ssPolicyNeedsCounselReview(loaded.body)
      : true;
  }

  let bodyHtml, srcNote;
  if (loaded) {
    bodyHtml = '<div class="doc-body stored">' + esc(loaded.body) + '</div>';
    srcNote = '<div class="src-note">Showing the stored version of this policy.</div>';
  } else {
    bodyHtml = '<div class="doc-body">' + cfg.body + '</div>';
    srcNote = '<div class="src-note">No counsel-approved version has been published yet — ' +
      'showing placeholder scaffolding so the surface is reachable and reviewable.</div>';
  }

  let extras = '';
  if (doc === 'copyright') extras = copyrightExtrasHtml();

  host.innerHTML =
    '<div class="doc">' +
      '<div class="doc-title">' + cfg.title + '</div>' +
      metaHtml(version, effDate) +
      (needsCounsel ? COUNSEL_BANNER : '') +
      srcNote +
      bodyHtml +
      extras +
      '<div class="legal-foot-note">ShowShak · all policy text is placeholder scaffolding pending counsel review.</div>' +
    '</div>';

  /* Keep the scroll at the top when switching docs. */
  const scroller = document.querySelector('.legal-scroll');
  if (scroller) scroller.scrollTop = 0;
}

document.addEventListener('DOMContentLoaded', function () {
  renderDoc(getDocParam());
});
/* If the script loads after DOMContentLoaded (defer ordering), render now. */
if (document.readyState !== 'loading') renderDoc(getDocParam());
</script>
</body>
</html>
