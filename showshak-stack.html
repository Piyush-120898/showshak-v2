<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ShowShak — Stack</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0B0B0F">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

<!-- PERF: warm the connections the clip viewer needs. -->
<link rel="preconnect" href="https://stream.mux.com" crossorigin>
<link rel="preconnect" href="https://image.mux.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://koqfxgrlwczlizfopmwa.supabase.co" crossorigin>
<link rel="dns-prefetch" href="https://stream.mux.com">
<link rel="dns-prefetch" href="https://image.mux.com">
<link rel="stylesheet" href="showshak-tokens.css">
<link rel="stylesheet" href="showshak-sidebar.css">
<link rel="stylesheet" href="showshak-mobile-nav.css">
<link rel="stylesheet" href="showshak-components.css">
<style>
  html, body { overflow: hidden; }

  .layout {
    position: fixed; inset: 0; left: var(--sidebar-collapsed, 64px);
    display: flex; flex-direction: column;
  }
  @media (max-width: 700px) { .layout { left: 0; bottom: var(--mobile-nav-h, 64px); } }

  .sf-body { flex: 1; overflow-y: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .sf-body::-webkit-scrollbar { display: none; }

  /* ── Header ── */
  .sf-head {
    position: relative; padding: 22px 40px 18px; border-bottom: 1px solid var(--border);
    overflow: hidden;
  }
  @media (max-width: 700px) { .sf-head { padding: 18px 18px 16px; } }
  .sf-head-blur {
    position: absolute; inset: 0; z-index: 0; opacity: 0.5;
    filter: blur(46px) saturate(1.2); transform: scale(1.25);
  }
  .sf-head-inner { position: relative; z-index: 1; }
  .sf-back {
    display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
    font-size: 13px; font-weight: 600; color: var(--gray); margin-bottom: 14px;
    background: none; border: none; padding: 0; -webkit-tap-highlight-color: transparent;
  }
  .sf-back:hover { color: var(--white); }
  .sf-name {
    font-family: var(--font-display, 'Bebas Neue', sans-serif);
    font-size: 38px; line-height: 1.02; letter-spacing: 1px; color: var(--white);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  @media (max-width: 700px) { .sf-name { font-size: 30px; } }
  .sf-badge {
    font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: 0.03em;
    padding: 3px 9px; border-radius: 100px; vertical-align: middle;
    color: #6FA8E0; background: rgba(111,168,224,0.12); border: 1px solid rgba(111,168,224,0.32);
  }
  .sf-meta { font-size: 12.5px; color: var(--gray); margin-top: 7px; }
  .sf-contrib { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .sf-contrib-label { font-size: 11px; color: var(--gray2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .sf-handle {
    font-size: 12.5px; font-weight: 600; color: var(--white); cursor: pointer;
    padding: 4px 10px; border-radius: 100px; background: var(--bg2); border: 1px solid var(--border);
    -webkit-tap-highlight-color: transparent;
  }
  .sf-handle.owner { color: var(--red2); border-color: var(--border2); }
  .sf-handle:hover { border-color: var(--border2); }
  .sf-actions { margin-top: 16px; display: flex; gap: 10px; }
  .sf-share {
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    font-family: var(--font-body); font-size: 13px; font-weight: 700; color: var(--white);
    background: var(--bg2); border: 1.5px solid var(--border); border-radius: 100px; padding: 9px 16px;
    -webkit-tap-highlight-color: transparent; transition: border-color 0.15s, transform 0.12s;
  }
  .sf-share:hover { border-color: var(--border2); }
  .sf-share:active { transform: scale(0.97); }

  /* ── Grid ── */
  .sf-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 22px 40px 40px;
  }
  @media (max-width: 980px) { .sf-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 700px) { .sf-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 16px 18px 32px; } }
  .sf-card { cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.18s var(--ease-spring, cubic-bezier(.34,1.56,.64,1)); }
  .sf-card:hover { transform: translateY(-4px); }
  .sf-card:active { transform: scale(0.96); }
  .sf-thumb {
    position: relative; aspect-ratio: 9/16; border-radius: 14px; overflow: hidden;
    background: linear-gradient(160deg,#1a0505,#2d0808,#0d0d0d,#000);
  }
  .sf-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .sf-thumb-vig { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 42%); }
  .sf-card-meta { position: absolute; left: 10px; right: 10px; bottom: 9px; z-index: 2; }
  .sf-card-creator { font-size: 12px; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
  .sf-card-fires { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: #fff; margin-top: 2px; opacity: 0.95; }

  /* ── States ── */
  .sf-state { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 30px; color: var(--gray); }
  .sf-state-ic { font-size: 34px; margin-bottom: 12px; }
  .sf-state-t { font-family: var(--font-display, 'Bebas Neue', sans-serif); font-size: 24px; letter-spacing: 1px; color: var(--white); }
  .sf-state-d { font-size: 13px; color: var(--gray); margin-top: 6px; max-width: 360px; }
  .sf-skel { padding: 22px 40px; }
  @media (max-width: 700px) { .sf-skel { padding: 16px 18px; } }
  .sf-skel-bar { height: 36px; width: 240px; border-radius: 8px; background: var(--bg3); margin-bottom: 22px; }
  .sf-skel-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  @media (max-width: 700px) { .sf-skel-grid { grid-template-columns: repeat(2, 1fr); } }
  .sf-skel-card { aspect-ratio: 9/16; border-radius: 14px; background: var(--bg3); animation: sfPulse 1.3s ease-in-out infinite; }
  @keyframes sfPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 0.85; } }
</style>
</head>
<body>

<!-- SHARED CHROME (sidebar + Watch It sheet + mobile nav) — injected by showshak-shared.js -->
<div id="ss-nav"></div>

<div class="layout">
  <div class="sf-body" id="sf-body">
    <!-- Loading skeleton (replaced on load) -->
    <div class="sf-skel" id="sf-skel">
      <div class="sf-skel-bar"></div>
      <div class="sf-skel-grid">
        <div class="sf-skel-card"></div><div class="sf-skel-card"></div>
        <div class="sf-skel-card"></div><div class="sf-skel-card"></div>
      </div>
    </div>
  </div>
</div>

<!-- SHARED JS -->
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script async src="https://cdn.jsdelivr.net/npm/@mux/mux-player@3"></script>
<script defer src="showshak-supabase.js"></script>
<script defer src="data/showshak-data.js"></script>
<script defer src="showshak-shared.js"></script>
<script defer src="showshak-stack-page.js"></script>
</body>
</html>
